[workspace]
name = "cloudfetch"
version = "0.1.3"
description = "Point cloud download library with PDAL-backed processing"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
python = "3.11.*"
pdal = "*"
geopandas = "*"
shapely = "*"
requests = "*"
pyproj = "*"
proj = "*"
proj-data = "*"
pip = "*"

[pypi-dependencies]
tkintermapview = "==1.29"

[feature.dev.dependencies]
pytest = ">=9.0.3,<10"
ruff = ">=0.6,<1"
mkdocs = ">=1.6.1,<2"
mkdocs-material = ">=9.7.6,<10"
mkdocstrings = ">=1.0.3,<2"
mkdocstrings-python = ">=2.0.2,<3"
mkdocs-include-markdown-plugin = ">=7.2.0,<8"

[feature.dev.pypi-dependencies]
cloudfetch = { path = ".", editable = true }
responses = "*"
build = ">=1.2.2,<2"
twine = ">=6.0.0"

[environments]
default = []
dev = ["dev"]

[tasks]
test = "pytest"
lint = "ruff check ."
build-dist = "python -m build"
check-dist = "python -m twine check dist/*"
publish-testpypi = "python -m twine upload --repository testpypi dist/*"
publish-pypi = "python -m twine upload dist/*"
